<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DART Ticket</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .ticket {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            position: relative;
        }
        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: blue;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 1.5s infinite;
        }
        .inner-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        .time {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="ticket">
        <div class="circle">
            <div class="inner-circle">DART</div>
        </div>
        <div class="time" id="time"></div>
        <div class="fare-info">Fare Information: $2.00 (Detroit, MI)</div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            const expiry = new Date(now.getTime() + 4 * 60 * 60 * 1000);
            const formattedTime = now.toUTCString();
            const formattedExpiry = expiry.toUTCString();
            document.getElementById('time').innerText = 
                `Current Time: ${formattedTime} (Expires: ${formattedExpiry})`;
        }

        function openFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.mozRequestFullScreen) { // Firefox
                document.documentElement.mozRequestFullScreen();
            } else if (document.documentElement.webkitRequestFullscreen) { // Chrome, Safari and Opera
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) { // IE/Edge
                document.documentElement.msRequestFullscreen();
            }
        }

        window.onload = function() {
            openFullscreen();
            updateTime();
            setInterval(updateTime, 1000);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DART Ticket</title>
    <style>
        /* Styles for the ticket */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f9fc;
        }
        .ticket {
            width: 300px;
            height: 400px;
            border: 2px solid #0075c9;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            background-color: white;
        }
        .pulsing-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 117, 201, 0.3) 0%, rgba(0, 117, 201, 0) 70%);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        .time, .fare-type, .location, .expiration {
            margin: 15px 0;
        }
    </style>
</head>
<body onload="openFullscreen()">
    <div class="ticket">
        <div class="pulsing-circle"></div>
        <h1>DART Ticket</h1>
        <div class="time">Current Time: <span id="current-time"></span></div>
        <div class="fare-type">Fare Type: Regular</div>
        <div class="location">Location: Detroit, MI</div>
        <div class="expiration">Expiration Time: <span id="expiration-time"></span></div>
    </div>
    <script>
        const updateTime = () => {
            const now = new Date();
            const utcDate = new Date(now.getTime() + now.getTimezoneOffset() * 60000);
            const formattedTime = utcDate.toISOString().replace('T', ' ').substring(0, 19);
            document.getElementById('current-time').innerText = formattedTime;
            const expirationDate = new Date(now);
            expirationDate.setMinutes(now.getMinutes() + 30);
            const formattedExpiration = expirationDate.toISOString().replace('T', ' ').substring(0, 19);
            document.getElementById('expiration-time').innerText = formattedExpiration;
        };
        const openFullscreen = () => {
            const element = document.documentElement;
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.mozRequestFullScreen) { // Firefox
                element.mozRequestFullScreen();
            } else if (element.webkitRequestFullscreen) { // Chrome, Safari and Opera
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) { // IE/Edge
                element.msRequestFullscreen();
            }
        };
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>

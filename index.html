<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Page</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #007bff;
            position: absolute;
        }
        .time-display {
            font-size: 24px;
            color: #333;
        }
        .ticket-info {
            font-size: 18px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="circle" style="top: 50px; left: 50px;"></div>
    <div class="circle" style="top: 200px; left: 150px;"></div>
    <div class="time-display" id="time-display"></div>
    <div class="ticket-info">Ticket Info: Your ticket details here.</div>

    <script>
        window.onload = function() {
            // Request fullscreen mode on page load
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.mozRequestFullScreen) { // Firefox
                document.documentElement.mozRequestFullScreen();
            } else if (document.documentElement.webkitRequestFullscreen) { // Chrome, Safari and Opera
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) { // IE/Edge
                document.documentElement.msRequestFullscreen();
            }

            // Update time display every second
            setInterval(function() {
                const now = new Date();
                const formattedTime = now.toUTCString();
                document.getElementById('time-display').innerText = formattedTime;
            }, 1000);
        };
    </script>
</body>
</html>
